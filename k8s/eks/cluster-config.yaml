apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: e-commerce-observability
  region: eu-west-1
  version: "1.34"

iam:
  withOIDC: true

managedNodeGroups:
  - name: app-ng
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20
    labels:
      role: app

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns
  - name: aws-ebs-csi-driver
