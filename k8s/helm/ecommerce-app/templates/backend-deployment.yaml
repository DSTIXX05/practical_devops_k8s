apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce-app.fullname" . }}-backend
  namespace: {{ include "ecommerce-app.namespace" . }}
  labels:
    {{- include "ecommerce-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "ecommerce-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "ecommerce-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PORT
              value: {{ .Values.backend.env.port | quote }}
            - name: DB_HOST
              value: {{ include "ecommerce-app.fullname" . }}-db
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ecommerce-app.fullname" . }}-db-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ecommerce-app.fullname" . }}-db-config
                  key: DB_NAME
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce-app.fullname" . }}-db-secret
                  key: DB_PASS
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ecommerce-app.fullname" . }}-db-config
                  key: DB_PORT
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.backend.service.port }}
            failureThreshold: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
